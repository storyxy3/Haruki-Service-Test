server:
  host: "0.0.0.0"
  port: 24000

drawing_api:
  base_url: "http://localhost:28000"
  timeout: 30s
  retry_count: 3
  output_dir: "D:/github/testfile"

masterdata:
  dir: "D:/github/haruki-sekai-master/master"
  cache_enabled: true

assets:
  dir: "Z:/pjskdata/Data"
  legacy_dirs: []

user_data:
  path: "D:/github/testfile/user.json"
  music_meta_path: "D:/github/testfile/music_metas.json"
  mysekai_path: "D:/github/testfile/mysekai.json"

log:
  level: "info"
  format: "json"

haruki_cloud:
  sekai_db:
    driver: "postgres"
    host: "localhost"
    port: 5432
    database: "master_data"
    user: "haruki"
    password: "sszh2015"
    sslmode: "disable"
  region: "jp"
  secondary_region: "cn"
  use_local_event_source: true
  use_local_card_source: false

deck_recommend:
  enabled: true
  use_local_engine: true
  local_pool_size: 0
  timeout: 60s
  default_algs: ["dfs", "ga"]
  servers:
    - url: "http://127.0.0.1:45556"
      weight: 1
